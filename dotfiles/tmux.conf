# Use Ctrl+b as prefix (default)
set -g prefix C-b
unbind C-a
bind C-b send-prefix

# Window switching with prefix
bind n next-window
bind p previous-window

# Direct pane navigation with Command+Option+Arrow (requires iTerm2 key mapping)
# iTerm2 config: Prefs > Keys > Key Bindings > Add:
#   Cmd+Option+Left  → Send Escape Sequence: [1;10D
#   Cmd+Option+Right → Send Escape Sequence: [1;10C
#   Cmd+Option+Up    → Send Escape Sequence: [1;10A
#   Cmd+Option+Down  → Send Escape Sequence: [1;10B

# Define custom user keys for the escape sequences
set -s user-keys[0] "\e[1;10D"
set -s user-keys[1] "\e[1;10C"
set -s user-keys[2] "\e[1;10A"
set -s user-keys[3] "\e[1;10B"

# Bind user keys to pane navigation
bind -n User0 select-pane -L
bind -n User1 select-pane -R
bind -n User2 select-pane -U
bind -n User3 select-pane -D

# Unbind plain Option+Arrow (only Cmd+Option+Arrow should navigate panes)
unbind -n M-Left
unbind -n M-Right
unbind -n M-Up
unbind -n M-Down

# Switch PANES with Option+` then Arrow (persistent mode - legacy)
# Press Option+` to enter pane mode, arrows to navigate, Escape/Enter to exit
bind-key -n M-` switch-client -T pane-select
bind-key -T pane-select Left select-pane -L \; switch-client -T pane-select
bind-key -T pane-select Right select-pane -R \; switch-client -T pane-select
bind-key -T pane-select Up select-pane -U \; switch-client -T pane-select
bind-key -T pane-select Down select-pane -D \; switch-client -T pane-select
bind-key -T pane-select h select-pane -L \; switch-client -T pane-select
bind-key -T pane-select l select-pane -R \; switch-client -T pane-select
bind-key -T pane-select k select-pane -U \; switch-client -T pane-select
bind-key -T pane-select j select-pane -D \; switch-client -T pane-select
bind-key -T pane-select Escape switch-client -T root
bind-key -T pane-select Enter switch-client -T root
bind-key -T pane-select q switch-client -T root

# Enable vi mode for copy mode
set-window-option -g mode-keys vi

# Mouse support - selections stay within pane boundaries
set -g mouse on

# Enable focus events for proper pane state tracking
set -g focus-events on

# Scroll 1/4 page (~12 lines) with Alt+u (up) and Alt+j (down)
bind-key -n M-u copy-mode \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up
bind-key -n M-j send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down

# In copy mode: Alt+u/j for 1/4 page scroll
bind-key -T copy-mode-vi M-u send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up \; send-keys -X scroll-up
bind-key -T copy-mode-vi M-j send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down \; send-keys -X scroll-down

# ============================================================================
# Pane Border Styling
# ============================================================================

# Active pane border color (the one you're in) - blue
set -g pane-active-border-style fg=#5599ff

# Inactive pane border color - green
set -g pane-border-style fg=#00aa00

# Border line style: heavy for thicker borders
# Requires tmux 3.2+
set -g pane-border-lines heavy

# Show pane title on top border (displays current directory)
set -g pane-border-status top
set -g pane-border-format "#[#{?pane_active,fg=#5599ff,fg=#00aa00}] #{pane_index}: #T "

# Force refresh on focus change
set-hook -g pane-focus-in 'select-pane -T "#{b:pane_current_path}" ; refresh-client -S'

# Show pane indicators (optional - shows pane numbers briefly)
# set -g pane-border-indicators both

# ============================================================================
# Zoom & Layout Controls (for 3x3 grid workflow)
# ============================================================================

# Alt+z: Toggle zoom (pane fills entire window, press again to restore)
bind -n M-z resize-pane -Z

# Alt+f: Toggle zoom (alternative - "fullscreen")
bind -n M-f resize-pane -Z

# Alt+g: Create column-first 3x3 grid (proper structure for column-isolated resize)
bind -n M-g run-shell '~/bin/tmux-grid-3x3.sh'

# Alt+w: Toggle full width (3 columns) - expands or resets to grid
bind -n M-w run-shell 'if [ "$(tmux show -pv @expanded_w)" = "1" ]; then tmux set -p @expanded_w 0; tmux select-layout tiled; else tmux set -p @expanded_w 1; tmux resize-pane -x "#{window_width}"; fi'

# Alt+h: Toggle full height within column (press again to restore)
bind -n M-h run-shell '~/bin/tmux-column-toggle.sh'

# F1: Expand current pane to full height within its column (column-isolated)
bind -n F1 run-shell '~/bin/tmux-column-expand.sh'

# Alt+e: Expand current pane to full height within its column (alternative to F1)
bind -n M-e run-shell '~/bin/tmux-column-expand.sh'

# F2: Rotate content in column (carousel down)
bind -n F2 run-shell '~/bin/tmux-swap-column.sh down'

# Alt+1-9: Quick jump to pane by number (for 9-pane grid)
bind -n M-1 select-pane -t 0
bind -n M-2 select-pane -t 1
bind -n M-3 select-pane -t 2
bind -n M-4 select-pane -t 3
bind -n M-5 select-pane -t 4
bind -n M-6 select-pane -t 5
bind -n M-7 select-pane -t 6
bind -n M-8 select-pane -t 7
bind -n M-9 select-pane -t 8

# Prefix + = : Re-tile all panes evenly (reset to grid)
bind = select-layout tiled

# Alt+= : Reset to column-first 3x3 grid (proper structure for column-isolated resize)
bind -n M-= run-shell '~/bin/tmux-grid-3x3.sh'

# Alt+Enter: Expand pane to full height (press again to equalize)
bind -n M-Enter run-shell 'h=$(tmux display -p "#{pane_height}"); w=$(tmux display -p "#{window_height}"); if [ "$h" -ge "$((w-2))" ]; then tmux select-layout tiled; tmux display-message "Equalized"; else tmux resize-pane -y 100%; tmux display-message "Expanded to full height"; fi'

# ============================================================================
# General Settings
# ============================================================================
set -g history-limit 500000
set -g status-right "#{host} • %Y-%m-%d %H:%M"
set -s default-terminal "tmux-256color"
set -s escape-time 0

# ============================================================================
# Plugin Manager (TPM)
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'wfxr/tmux-fzf-url'

# tmux-fzf-url settings
set -g @fzf-url-bind 'u'  # prefix + u to trigger

# OSC 52 clipboard support (for remote SSH)
set -g set-clipboard on

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
